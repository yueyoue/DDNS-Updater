# ============================================
# DDNS-Updater 配置文件
# 自动检测公网IP变化，更新传奇引擎控制台和微端网关
# ============================================

# 检测间隔（秒）
interval: 60

# 公网IP检测源（多个备用）
detect_urls:
  - https://api.ipify.org
  - https://ifconfig.me/ip
  - https://icanhazip.com
  - https://ipecho.net/plain

# ============================================
# 文件更新器 - 自动替换配置文件中的IP
# old: 填写当前IP（第一次手动填，之后程序自动维护）
# new: {{.IP}} 会自动替换为检测到的新IP
# ============================================
file_updaters:
  # 引擎控制台配置文件
  - name: 引擎控制台-外网IP
    path: 'D:\MirServer\Mir200\Envir\!Setup.txt'
    old: '111.111.111.111'
    new: '{{.IP}}'

  # 微端网关配置文件（如果用的是文本配置）
  - name: 微端网关-服务器地址
    path: 'D:\MirServer\微端网关\config.ini'
    old: '111.111.111.111'
    new: '{{.IP}}'

# ============================================
# 命令执行器 - IP更新后自动执行命令
# 用于更新SQLite数据库、重启服务等
# ============================================
commands:
  # 用sqlite3命令行更新微端网关数据库
  - name: 更新微端网关数据库
    cmd: 'cmd'
    args:
      - '/c'
      - 'sqlite3'
      - 'D:\MirServer\微端网关\wd.db'
      - "UPDATE server_list SET address='{{.IP}}';UPDATE config SET value='{{.IP}}' WHERE key='ServerAddress';"
    timeout: 30

  # 重启微端网关服务
  - name: 重启微端网关
    cmd: 'cmd'
    args: ['/c', 'net', 'restart', 'WDGateway']
    timeout: 30

  # 重启引擎控制台（可选）
  # - name: 重启引擎
  #   cmd: 'cmd'
  #   args: ['/c', 'taskkill /f /im GameCenter.exe & start "" D:\MirServer\GameCenter.exe']
  #   timeout: 30
