name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod tidy

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildTime=$(date -u +%Y%m%d)" \
            -o ddns-updater.exe .

      - name: Build Windows 386
        env:
          GOOS: windows
          GOARCH: 386
          CGO_ENABLED: 1
          CC: i686-w64-mingw32-gcc
        run: |
          sudo apt-get install -y gcc-mingw-w64-i686
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildTime=$(date -u +%Y%m%d)" \
            -o ddns-updater-x86.exe .

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ddns-updater.exe
            ddns-updater-x86.exe
          body: |
            ## DDNS-Updater ${{ github.ref_name }}
            自动检测公网IP变化，更新传奇引擎控制台和微端网关配置

            | 文件 | 说明 |
            |------|------|
            | ddns-updater.exe | 64位版本（推荐） |
            | ddns-updater-x86.exe | 32位版本 |

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ddns-updater
          path: |
            ddns-updater.exe
            ddns-updater-x86.exe
